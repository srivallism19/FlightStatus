<form [formGroup]="form" (ngSubmit)="onSubmit()" class="search-form">
  <div class="field-grid">
    <mat-form-field appearance="outline" class="field">
      <mat-label>Flight number</mat-label>
      <input matInput type="text" formControlName="flightNumber" placeholder="e.g. AA123" autocomplete="off" />
      <mat-error *ngIf="flightNumber.invalid && flightNumber.touched">Enter a valid flight number</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="field">
      <mat-label>Departure date</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="date" placeholder="Select date" readonly />
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
      <mat-error *ngIf="date.invalid && date.touched">Select a date</mat-error>
    </mat-form-field>
  </div>

  <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">Search status</button>
</form>

<div class="result-panel">
      <div class="status-line" *ngIf="loading">Checking flight status…</div>
      <app-result-card [status]="status" [error]="error"></app-result-card>
</div>
